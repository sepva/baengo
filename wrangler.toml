name = "baengo"
main = "backend/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Default variables (for all environments)
vars = { ENVIRONMENT = "development" }

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "baengo-db"
database_id = "d4a9eca3-6117-4b3f-820e-77b7a3c23ff0"

# Secrets: set via 'wrangler secret put JWT_SECRET'
# Do NOT store secret values in wrangler.toml
# Example: wrangler secret put JWT_SECRET

# Environment configurations
[env.production]
vars = { ENVIRONMENT = "production" }
routes = [
  { pattern = "baengo.melios.be/api/*", zone_name = "melios.be" }
]

[[env.production.d1_databases]]
binding = "DB"
database_name = "baengo-db"
database_id = "d4a9eca3-6117-4b3f-820e-77b7a3c23ff0"

[env.development]
vars = { ENVIRONMENT = "development" }

[[env.development.d1_databases]]
binding = "DB"
database_name = "baengo-db"
database_id = "d4a9eca3-6117-4b3f-820e-77b7a3c23ff0"
